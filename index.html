<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommily | IoT Dashboard</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light min-vh-100 d-flex flex-column">

    <!-- Header / Navbar -->
    <header class="navbar navbar-expand bg-body-tertiary border-bottom border-secondary border-opacity-10 py-3 mb-4 sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 m-0" href="#">
                <i class="bi bi-cpu-fill text-info fs-3"></i>
                <h4 class="mb-0 fw-bold outfit">Hommily</h4>
            </a>
            
            <div id="auth-info" class="ms-auto d-flex align-items-center gap-3 d-none">
                <span class="small text-secondary d-none d-sm-inline" id="user-email">--</span>
                <button id="btn-logout" class="btn btn-sm btn-outline-danger px-3 rounded-pill">Log Out</button>
            </div>
        </div>
    </header>

    <main class="container mb-5 flex-grow-1">
        
        <!-- Login Section -->
        <div id="login-section" class="row justify-content-center py-5">
            <div class="col-md-5 col-lg-4">
                <div class="card glass border-0 p-4 shadow-lg text-center">
                    <i class="bi bi-shield-lock text-info display-1 mb-3"></i>
                    <h2 class="fw-bold mb-4 outfit">Device Access</h2>
                    <form id="authForm" class="text-start">
                        <div class="mb-3">
                            <label class="form-label small text-secondary fw-bold">Email Address</label>
                            <input type="email" id="authEmail" class="form-control bg-dark border-secondary bg-opacity-50" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-secondary fw-bold">Password</label>
                            <input type="password" id="authPassword" class="form-control bg-dark border-secondary bg-opacity-50" placeholder="••••••••" required>
                        </div>
                        <div id="auth-error" class="text-danger small mb-3"></div>
                        <div class="d-grid gap-2">
                            <button type="button" id="btn-signin" class="btn btn-primary fw-bold py-2">Sign In</button>
                            <button type="button" id="btn-signup" class="btn btn-link btn-sm text-secondary text-decoration-none">Create a new account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="data-section" class="d-none">
            
            <div class="d-flex align-items-center justify-content-between mb-4 mt-2">
                <div>
                    <h2 class="fw-bold mb-0 outfit">IoT Control Center</h2>
                    <p class="text-secondary small mb-0"><i class="bi bi-broadcast me-2"></i>Live Device Monitoring</p>
                </div>
                <div class="bg-body-tertiary px-3 py-2 rounded-4 border border-secondary border-opacity-10 d-none d-md-block">
                    <span class="small text-secondary me-2">UID:</span>
                    <code id="user-uid" class="text-info small jetbrains">--</code>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div id="dashboard-container">
                <!-- Device Blocks will be spawned here -->
                 <div class="text-center py-5">
                     <div class="spinner-border text-info" role="status"></div>
                     <p class="mt-3 text-secondary">Synchronizing with Firebase...</p>
                 </div>
            </div>

        </div>

    </main>

    <footer class="py-4 text-center text-secondary small border-top border-secondary border-opacity-10 mt-auto">
        <div class="container">
            <span class="outfit">Hommily IoT Hub &copy; 2026</span>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
